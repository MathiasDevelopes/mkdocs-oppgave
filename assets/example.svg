<svg xmlns="http://www.w3.org/2000/svg" width="800" height="360" viewBox="0 0 800 360">
  <rect width="800" height="360" fill="#0d0d1a"/>
  <!-- Grid floor tiles -->
  <g fill="#1a1a2e" stroke="#2a2a4a" stroke-width="1">
    <rect x="0" y="240" width="800" height="120"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="80" y1="240" x2="80" y2="360"/>
    <line x1="160" y1="240" x2="160" y2="360"/>
    <line x1="240" y1="240" x2="240" y2="360"/>
    <line x1="320" y1="240" x2="320" y2="360"/>
    <line x1="400" y1="240" x2="400" y2="360"/>
    <line x1="480" y1="240" x2="480" y2="360"/>
    <line x1="560" y1="240" x2="560" y2="360"/>
    <line x1="640" y1="240" x2="640" y2="360"/>
    <line x1="720" y1="240" x2="720" y2="360"/>
  </g>
  <!-- Dungeon walls -->
  <rect x="0" y="0" width="800" height="60" fill="#111122"/>
  <rect x="0" y="0" width="30" height="360" fill="#111122"/>
  <rect x="770" y="0" width="30" height="360" fill="#111122"/>
  <!-- Torches -->
  <rect x="100" y="50" width="8" height="20" fill="#8B4513"/>
  <ellipse cx="104" cy="48" rx="8" ry="12" fill="#ff6600" opacity="0.9"/>
  <ellipse cx="104" cy="44" rx="5" ry="8" fill="#ffcc00"/>
  <rect x="660" y="50" width="8" height="20" fill="#8B4513"/>
  <ellipse cx="664" cy="48" rx="8" ry="12" fill="#ff6600" opacity="0.9"/>
  <ellipse cx="664" cy="44" rx="5" ry="8" fill="#ffcc00"/>
  <!-- Knight character (pixel art style) -->
  <rect x="180" y="160" width="32" height="32" fill="#a0a0c0"/>
  <rect x="184" y="152" width="24" height="16" fill="#c0c0e0"/>
  <rect x="176" y="168" width="10" height="24" fill="#808090"/>
  <rect x="214" y="164" width="6" height="32" fill="#c0c0e0"/>
  <!-- Slime enemy 1 -->
  <ellipse cx="400" cy="220" rx="28" ry="20" fill="#44cc44"/>
  <ellipse cx="400" cy="210" rx="20" ry="18" fill="#55dd55"/>
  <circle cx="393" cy="208" r="4" fill="#003300"/>
  <circle cx="407" cy="208" r="4" fill="#003300"/>
  <circle cx="393" cy="207" r="2" fill="#ffffff"/>
  <circle cx="407" cy="207" r="2" fill="#ffffff"/>
  <!-- Slime enemy 2 (smaller) -->
  <ellipse cx="520" cy="225" rx="18" ry="14" fill="#33bb33"/>
  <ellipse cx="520" cy="217" rx="14" ry="13" fill="#44cc44"/>
  <circle cx="515" cy="215" r="3" fill="#002200"/>
  <circle cx="525" cy="215" r="3" fill="#002200"/>
  <!-- Treasure chest -->
  <rect x="620" y="195" width="44" height="32" fill="#8B6914"/>
  <rect x="620" y="195" width="44" height="14" fill="#a07820"/>
  <rect x="636" y="205" width="12" height="10" fill="#ffd700" rx="2"/>
  <rect x="640" y="207" width="4" height="6" fill="#8B6914"/>
  <!-- HP bar -->
  <rect x="50" y="20" width="120" height="14" fill="#330000" rx="3"/>
  <rect x="50" y="20" width="80" height="14" fill="#cc2222" rx="3"/>
  <text x="55" y="32" font-family="monospace" font-size="10" fill="#ffffff">HP  80/120</text>
  <!-- Score -->
  <text x="340" y="35" font-family="monospace" font-size="12" fill="#ffd700">SCORE: 04820</text>
  <!-- Floor indicator -->
  <text x="670" y="35" font-family="monospace" font-size="11" fill="#aaaacc">FLOOR 3</text>
  <!-- Caption -->
  <text x="400" y="350" font-family="monospace" font-size="11" fill="#555577" text-anchor="middle">Floor 3 — The Slime Caverns</text>
</svg>
