site_name: Mkdocs Oppgave
site_description: Skoleoppgave – dokumentasjonsside med MkDocs Material
site_author: MathiasDevelopes
site_url: https://MathiasDevelopes.github.io/mkdocs-oppgave/

repo_name: MathiasDevelopes/mkdocs-oppgave
repo_url: https://github.com/MathiasDevelopes/mkdocs-oppgave

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guide:
      - Overview: guide/overview.md
      - Advanced Topics: guide/advanced.md
  - About: about.md

plugins:
  - search
  - callouts

markdown_extensions:
  - admonition
  - nl2br
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MathiasDevelopes
